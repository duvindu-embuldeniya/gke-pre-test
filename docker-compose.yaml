version: "3.9"

services:
  # Django backend
  backend:
    build: ./backend
    image: backend:django
    container_name: django_backend_container
    # ports:
    #   - 8000:8000
    command: >
      sh -c "sleep 10 &&
             python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             gunicorn backend_rnd.wsgi:application --bind 0.0.0.0:8000 --timeout 5 --threads 10"



  # React frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_SERVER_BASE_URL: "/api/v1"
    image: frontend:react
    container_name: react_frontend_container
    # ports:
    #   - 5173:80
    depends_on:
      - backend
    command: >
      sh -c "sleep 15 && nginx -g 'daemon off;'"



  nginx:
    image: nginx:alpine
    container_name: nginx_container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    command: >
      sh -c "sleep 20 && nginx -g 'daemon off;'"



